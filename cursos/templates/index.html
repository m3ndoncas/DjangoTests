{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel = "stylesheet" href="{% static 'css/contato.css' %}">
</head>
    <body>
    <center>
    <h1>Home</h1>
        <img src="{% static 'images/djangoLogo.png' %}">
        <h2>{{ curso }}</h2>

        <table>
            <thead>
                <tr>Produto</tr>
                <tr>Preço</tr>
            </thead>
            <tbody>
                {% for p in produtos %}
                <tr>
                    <td><a href="{% url 'produto' p.id %}">{{p.nome}}</a></td>
                    <td>{{p.preco}}</td>
                {% endfor %}
                </tr>
            </tbody>

        </table>

        <button onclick="teste();">Clique</button>
</center>
        <script type="text/javascript" src="{% static 'js/script.js' %}"></script>
    </body>
</html>
