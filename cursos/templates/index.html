{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel = "stylesheet" href="{% static 'css/estilos.css' %}">
</head>
    <body>
        <h1>Home</h1>
        <h2>{{ curso }}</h2>

        <table>
            <thead>
                <tr>Produto</tr>
                <tr>Preço</tr>
            </thead>
            <tbody>
                {% for p in produtos %}
                <tr>
                    <td><a href="{% url 'produto' p.id %}">{{p.nome}}</a></td>
                    <td>{{p.preco}}</td>
                {% endfor %}
                </tr>
            </tbody>

        </table>
    </body>
</html>
